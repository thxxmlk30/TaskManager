{% extends "base.html" %}
{% block title %}Supprimer la tâche{% endblock %}
{% block content %}
<h2>Supprimer la tâche "{{ tache.titre }}" ?</h2>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
    <a href="{% url 'projects:projet_detail' projet.pk %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
