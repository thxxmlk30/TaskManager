{% extends "base.html" %}
{% block title %}Demander OTP{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
    <div class="auth-brand"><h1>Demander un code OTP</h1></div>
    <div class="auth-subtitle">Recevez un code par e-mail pour vous connecter</div>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
            </div>
        {% endfor %}
                <button type="submit" class="btn btn-primary w-100">Envoyer le code</button>
        </form>
    </div>
</div>
{% endblock %}
